<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="90" fill="#3B9EFF"/>
  <!-- Handle drawn from circle center outward; circle layer covers the inner segment -->
  <line x1="256" y1="168" x2="376" y2="54" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <!-- Magnifying glass ring: white outer circle + blue inner lens -->
  <circle cx="256" cy="168" r="76" fill="white"/>
  <circle cx="256" cy="168" r="50" fill="#3B9EFF"/>
  <!-- Neck connecting magnifying glass to shoulders -->
  <rect x="238" y="244" width="36" height="20" fill="white"/>
  <!-- Suit body (trapezoid, wider at bottom) -->
  <polygon points="178,264 334,264 416,436 96,436" fill="white"/>
  <!-- Collar V cut-out in suit (blue = background color) -->
  <polygon points="210,264 302,264 256,378" fill="#3B9EFF"/>
</svg>
